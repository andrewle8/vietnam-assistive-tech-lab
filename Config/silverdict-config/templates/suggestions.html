<!DOCTYPE html>
<html lang="vi">
<head>
  <title>{{key}} - Không tìm thấy</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style type="text/css">
    body { font-family: Arial, sans-serif; font-size: 18px; padding: 20px; max-width: 900px; margin: 0 auto; }
    .search-box { padding: 10px; background: #f5f5f5; border-radius: 5px; margin-bottom: 20px; }
    .search-box label { display: inline-block; margin-right: 10px; font-weight: bold; }
    .search-box input { font-size: 18px; padding: 6px; width: 55%; }
    .search-box button { font-size: 18px; padding: 6px 18px; cursor: pointer; }
    h1 { color: #003366; }
    ul { line-height: 1.8; }
    a { font-size: 18px; color: #003366; }
  </style>
</head>
<body>
  <header class="search-box">
    <form id="dict-form" role="search">
      <label for="word">Tra từ khác (Look up another):</label>
      <input type="text" id="word" name="word" autofocus required autocomplete="off" spellcheck="false">
      <button type="submit">Tra</button>
    </form>
  </header>
  <main>
    <h1>Không tìm thấy "{{key}}"</h1>
    <p>Gợi ý (Suggestions):</p>
    <ul>
    {% for suggestion in suggestions %}
      <li><a href="/api/query/{{group_name}}/{{suggestion}}">{{suggestion}}</a></li>
    {% endfor %}
    </ul>
  </main>
  <script>
    document.getElementById('dict-form').addEventListener('submit', function(e) {
      e.preventDefault();
      var w = document.getElementById('word').value.trim();
      if (w) window.location.href = '/api/query/Default%20Group/' + encodeURIComponent(w);
    });
  </script>
</body>
</html>
