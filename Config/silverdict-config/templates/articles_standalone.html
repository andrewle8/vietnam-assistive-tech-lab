<!DOCTYPE html>
<html lang="vi">
<head>
  <title>{{key}} - Từ điển</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style type="text/css">
    body { font-family: Arial, sans-serif; font-size: 18px; padding: 20px; max-width: 900px; margin: 0 auto; }
    .search-box { padding: 10px; background: #f5f5f5; border-radius: 5px; margin-bottom: 20px; }
    .search-box label { display: inline-block; margin-right: 10px; font-weight: bold; }
    .search-box input { font-size: 18px; padding: 6px; width: 55%; }
    .search-box button { font-size: 18px; padding: 6px 18px; cursor: pointer; }
    h1 { color: #003366; }
    .article-block {
      border-top: 2px solid #ccc;
      border-bottom: 2px solid #ccc;
      margin-top: 10px;
      margin-bottom: 10px;
      padding: 10px 0;
    }
    img { max-width: 100%; }
    hr { border: none; border-top: 0.5px solid #ccc; width: 98%; }
    .dictionary-headings {
      padding-top: 5px;
      padding-bottom: 5px;
      color: darkgreen;
      font-weight: bolder;
    }
    .headword { color: #003366; font-size: 22px; }
    audio { height: 0.8em; }
    p { line-height: 1.5; }
  </style>
</head>
<body>
  <header class="search-box">
    <form id="dict-form" role="search">
      <label for="word">Tra từ (Look up):</label>
      <input type="text" id="word" name="word" autofocus required autocomplete="off" spellcheck="false">
      <button type="submit">Tra</button>
    </form>
  </header>
  <main>
    <h1>{{key}}</h1>
    {% for article in articles %}
    <div class="article-block" id="{{article[0]}}">
      <h2 class="dictionary-headings">
        {{article[1]}}
      </h2>
      {{article[2] | safe}}
    </div>
    {% endfor %}
  </main>
  <script>
    document.getElementById('dict-form').addEventListener('submit', function(e) {
      e.preventDefault();
      var w = document.getElementById('word').value.trim();
      if (w) window.location.href = '/api/query/Default%20Group/' + encodeURIComponent(w);
    });
  </script>
</body>
</html>
