schemaVersion = 18
[general]
	language = vi
	saveConfigurationOnExit = False
	showWelcomeDialogAtStartup = False
[speech]
	synth = sapi5
	autoLanguageSwitching = True
	autoDialectSwitching = True
	[[sapi5]]
		voice = HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\Speech\Voices\Tokens\Minh Du
		rate = 35
		volume = 100
[keyboard]
	keyboardLayout = laptop
	speakTypedCharacters = True
	speakTypedWords = True
	speakCommandKeys = True
[braille]
	[[noBraille]]
[update]
	autoCheck = False
	allowUsageStats = False
	askedAllowUsageStats = True
[remote]
	[[connections]]
	[[controlServer]]
	[[seenMOTDs]]
	[[trustedCertificates]]
	[[ui]]
[vision]
	[[NVDAHighlighter]]
		highlightFocus = False
		highlightNavigator = False
		highlightBrowseMode = False
	[[screenCurtain]]
[addonStore]
[development]
